# Produção "puxadinho": sem domínio novo, sem EC2 novo, sem Postgres novo.
# - App num sub-caminho do domínio existente (janocaminho.com.br/meus-exames)
# - Reaproveita o Postgres JÁ EXISTENTE (janocaminho-postgres) — só cria um BANCO novo "meus_exames"
# - O nginx do EC2 só ganha uma rota nova (não mexe no EdEspeto)
#
# Uso no EC2:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
services:
  meus-exames-app:
    build: .
    container_name: meus-exames-app
    restart: unless-stopped
    env_file: .env.prod
    # permite ao container alcançar o janocaminho-postgres exposto no host (5432)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # só em localhost — o nginx do EC2 faz o proxy HTTPS do /meus-exames
      - "127.0.0.1:4010:4001"
    volumes:
      # PDFs enviados (persistem entre deploys)
      - ./data/exams:/app/data/exams
      # Fotos dos pacientes (persistem entre deploys)
      - ./data/photos:/app/data/photos
