# Produção com GHCR: o GitHub builda a imagem e o EC2 SÓ BAIXA (sem build na máquina).
services:
  meus-exames-app:
    image: ghcr.io/edmilsonfernandes/meus-exames-app:latest
    container_name: meus-exames-app
    restart: unless-stopped
    env_file: .env.prod
    environment:
      WEB_ORIGIN: ${WEB_ORIGIN:-https://janocaminho.com.br}
      WEB_BASE_PATH: ${WEB_BASE_PATH:-/minhasaude}
      UPLOAD_DIR: /app/data/exams
      PHOTOS_DIR: /app/data/photos
      AGENT_DIR: /app/data/agent
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:4010:4001"
    volumes:
      - ./data/exams:/app/data/exams
      - ./data/photos:/app/data/photos
      - ./data/agent:/app/data/agent
    networks:
      - janocaminho_default
    pull_policy: always

networks:
  janocaminho_default:
    external: true
