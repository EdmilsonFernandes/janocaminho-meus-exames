<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" fill="none">
  <!-- robô "Dr. Exame" — mesma família visual do ecossistema (cabeça quadrada arredondada, antena, olhos verdes; teal #336886 + verde #5FD35A) com toque médico -->
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2EBF2"/>
      <stop offset="1" stop-color="#8EC5DD"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="156" height="156" rx="40" fill="url(#ring)"/>

  <!-- antena -->
  <line x1="80" y1="28" x2="80" y2="46" stroke="#336886" stroke-width="5" stroke-linecap="round"/>
  <circle cx="80" cy="24" r="7" fill="#5FD35A"/>

  <!-- cabeça (quadrada arredondada, como a do ecossistema) -->
  <rect x="44" y="46" width="72" height="64" rx="20" fill="#336886"/>
  <rect x="50" y="52" width="60" height="52" rx="15" fill="#0f2c3a"/>

  <!-- olhos verdes -->
  <circle cx="69" cy="78" r="8" fill="#5FD35A"/>
  <circle cx="91" cy="78" r="8" fill="#5FD35A"/>
  <circle cx="71" cy="76" r="3" fill="#E7F6E7"/>
  <circle cx="93" cy="76" r="3" fill="#E7F6E7"/>

  <!-- sorriso -->
  <path d="M67 90 q13 10 26 0" stroke="#8EC5DD" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- estetoscópio (toque médico) -->
  <path d="M116 96 q22 6 20 28" stroke="#cfe3ff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="136" cy="126" r="9" fill="#1b4f6b"/>
  <circle cx="136" cy="126" r="4" fill="#8EC5DD"/>

  <!-- crachá de cruz médica -->
  <circle cx="56" cy="122" r="15" fill="#ffffff"/>
  <rect x="51.5" y="114" width="9" height="16" rx="2.5" fill="#e53935"/>
  <rect x="46" y="117.5" width="20" height="9" rx="2.5" fill="#e53935"/>
</svg>
