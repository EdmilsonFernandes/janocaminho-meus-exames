<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#20b2aa" />
    <title>Meus Exames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Mobile: trava o overflow horizontal (tela não escorrega pro lado) */
      html, body, #root { max-width: 100vw; overflow-x: hidden; }
      body { -webkit-text-size-adjust: 100%; font-family: "Inter", "Segoe UI", Roboto, system-ui, sans-serif; }
      /* NUCLEAR: força TODOS os elementos a respeitar a largura da tela no mobile */
      *, *::before, *::after { box-sizing: border-box; }
      .RaLayout-content { max-width: 100vw !important; overflow-x: hidden !important; overflow-wrap: break-word; word-break: break-word; }
      .MuiCard-root { max-width: 100% !important; overflow-wrap: break-word; }
      .MuiContainer-root { max-width: 100% !important; padding-left: 12px; padding-right: 12px; }
      .MuiContainer-maxWidthMd, .MuiContainer-maxWidthLg { max-width: 100% !important; }
      pre, code, table { max-width: 100%; overflow-x: auto; }
      img { max-width: 100%; height: auto; }
      /* Tabelas rolam horizontal dentro do card em vez de empurrar a página */
      .MuiTableContainer-root { overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
      /* Evita zoom de inputs no iOS */
      input, select, textarea { font-size: 16px; }
      /* Menu lateral: labels NUNCA cortam — quebram de linha em vez de truncar */
      .MuiDrawer-paper .MuiListItemText-primary { white-space: normal !important; word-break: break-word !important; overflow: visible !important; text-overflow: clip !important; }
      .MuiDrawer-paper .MuiListItemButton-root { padding-right: 10px; }
      .MuiDrawer-paper { overflow-y: auto !important; }
      /* Células de tabela quebram palavra longa em vez de estourar layout */
      .MuiTableCell-root { word-break: break-word; }
      /* Safe-area: AppBar sticky cobre o notch; conteúdo flui logo abaixo (sem sobrepor) */
      .MuiAppBar-root { position: sticky !important; top: 0; padding-top: env(safe-area-inset-top); }
      .RaLayout-content { margin-top: 0 !important; padding-top: 0 !important; }
      .MuiDrawer-paper { padding-top: env(safe-area-inset-top); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Limpa Service Worker de OUTRO app (EdEspeto) que pode interceptar /minhasaude e redirecionar
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) {
            if (reg.scope && !reg.scope.includes('minhasaude')) { reg.unregister(); }
          });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
