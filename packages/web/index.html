<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#20b2aa" />
    <title>Meus Exames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Mobile: trava o overflow horizontal (tela não escorrega pro lado) */
      html, body, #root { max-width: 100%; overflow-x: hidden; }
      body { -webkit-text-size-adjust: 100%; font-family: "Inter", "Segoe UI", Roboto, system-ui, sans-serif; }
      /* Tabelas rolam horizontal dentro do card em vez de empurrar a página */
      .MuiTableContainer-root { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      /* Evita zoom de inputs no iOS */
      input, select, textarea { font-size: 16px; }
      /* Menu lateral: labels NUNCA cortam — quebram de linha em vez de truncar */
      .MuiDrawer-paper .MuiListItemText-primary { white-space: normal !important; word-break: break-word !important; overflow: visible !important; text-overflow: clip !important; }
      .MuiDrawer-paper .MuiListItemButton-root { padding-right: 10px; }
      .MuiDrawer-paper { overflow-y: auto !important; }
      /* Células de tabela quebram palavra longa em vez de estourar layout */
      .MuiTableCell-root { word-break: break-word; }
      /* Safe-area (notch/status bar): header cresce e o conteúdo desce junto (sem sobrepor) */
      .MuiAppBar-root { padding-top: env(safe-area-inset-top); }
      .RaLayout-content { padding-top: env(safe-area-inset-top); }
      .MuiDrawer-paper { padding-top: env(safe-area-inset-top); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
