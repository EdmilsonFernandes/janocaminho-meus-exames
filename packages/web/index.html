<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#20b2aa" />
    <title>Meus Exames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Mobile: trava o overflow horizontal (tela não escorrega pro lado) */
      html, body, #root { max-width: 100vw; overflow-x: hidden; }
      /* Feel de app nativo no iPhone: SEM "rebolada" lateral / rubber-band.
         (sem position:fixed no body pra não quebrar o AppBar/Drawer do react-admin) */
      html, body {
        overscroll-behavior-x: none;   /* sem bounce/arrasto horizontal */
        overscroll-behavior-y: none;   /* sem rubber-band vertical no topo/fundo */
        touch-action: pan-y;           /* só gesto de rolar vertical */
      }
      body { -webkit-text-size-adjust: 100%; font-family: "Inter", "Segoe UI", Roboto, system-ui, sans-serif; }
      /* NUCLEAR: força TODOS os elementos a respeitar a largura da tela no mobile */
      *, *::before, *::after { box-sizing: border-box; }
      .RaLayout-content { max-width: 100vw !important; overflow-x: hidden !important; overflow-wrap: break-word; word-break: break-word; }
      .MuiCard-root { max-width: 100% !important; overflow-wrap: break-word; }
      /* CHIPS nunca estouram: o label quebra de linha e o chip respeita a largura do pai.
         (corrigia "TSH / T4 / ANTICORPOS..." e "PROLACTINA: 21,2..." transbordando) */
      .MuiChip-root { max-width: 100% !important; }
      .MuiChip-label { white-space: normal !important; word-break: break-word !important; overflow-wrap: anywhere !important; }
      /* Filhos de Stack/Box flex podem ENCOLHER — sem isso, texto longo empurra pra fora da tela */
      .MuiStack-root > *, .MuiBox-root { min-width: 0; }
      /* Recharts: NÃO mexer (max-width no wrapper também quebra a medição e some com o gráfico
         da Tendência). O donut do Dashboard já tem dimensão fixa; ResponsiveContainer mede sozinho. */
      .MuiContainer-root { max-width: 100% !important; padding-left: 12px; padding-right: 12px; }
      .MuiContainer-maxWidthMd, .MuiContainer-maxWidthLg { max-width: 100% !important; }
      pre, code, table { max-width: 100%; overflow-x: auto; }
      img { max-width: 100%; height: auto; }
      /* Tabelas rolam horizontal dentro do card em vez de empurrar a página */
      .MuiTableContainer-root { overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
      /* Evita zoom de inputs no iOS */
      input, select, textarea { font-size: 16px; }
      /* Menu lateral: labels NUNCA cortam — quebram de linha em vez de truncar */
      .MuiDrawer-paper .MuiListItemText-primary { white-space: normal !important; word-break: break-word !important; overflow: visible !important; text-overflow: clip !important; }
      .MuiDrawer-paper .MuiListItemButton-root { padding-right: 10px; }
      .MuiDrawer-paper { overflow-y: auto !important; }
      /* Células de tabela quebram palavra longa em vez de estourar layout */
      .MuiTableCell-root { word-break: break-word; }
      /* Safe-area: AppBar sticky cobre o notch; conteúdo flui logo abaixo (sem sobrepor) */
      .MuiAppBar-root { position: sticky !important; top: 0; padding-top: env(safe-area-inset-top); }
      /* Gap no topo em TODAS as telas: zera a margem/padding-top do wrapper de conteúdo do react-admin v5
         ( AppBar é sticky, então o <main> não precisa do offset de appbar fixed ). */
      #main-content, main, [class*="RaLayout"] { margin-top: 0 !important; padding-top: 0 !important; }
      .MuiDrawer-paper { padding-top: env(safe-area-inset-top); }
      /* Dr. Exame flutuante: pulso suave pra convidar a perguntar (só desktop, JS controla o segue-cur sor) */
      @keyframes drPulse { 0%,100% { box-shadow: 0 6px 18px rgba(32,178,170,.35); } 50% { box-shadow: 0 6px 26px rgba(32,178,170,.75); } }
      /* Mobile: folga no rodapé do conteúdo pra o FAB do Dr. Exame não cobrir paginação/rodapé. */
      @media (max-width: 599px) { #main-content { padding-bottom: 84px !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Limpa Service Worker de OUTRO app (EdEspeto) que pode interceptar /minhasaude e redirecionar
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) {
            if (reg.scope && !reg.scope.includes('minhasaude')) { reg.unregister(); }
          });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
