name: Publish Docker Image (GHCR)

# BUILDA a imagem no GitHub (servidores potentes) → publica no GHCR.
# O EC2 NÃO builda (só baixa a imagem pronta — não estoura a RAM da t2.micro).
# GATE: job `test` roda a suite (vitest, ~128 testes) ANTES do build — se falhar,
# nada é buildado/publicado → deploy (workflow_run) só roda em success → prod fica na última versão boa.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Serializa builds: um push novo CANCELA builds antigos concorrentes → a tag :latest
# sempre reflete o commit mais recente (sem isso, builds lentos de commits antigos
# sobrescrevem :latest e o prod reverte — race de CI).
concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/edmilsonfernandes/meus-exames-app

jobs:
  # === GATE DE TESTE: roda a suite do server contra um postgres efêmero ===
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meus_exames
          POSTGRES_PASSWORD: meus_exames_dev
          POSTGRES_DB: meus_exames_test
        ports: ['5433:5432']
        options: >-
          --health-cmd "pg_isready -U meus_exames"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://meus_exames:meus_exames_dev@localhost:5433/meus_exames_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd packages/server && npx prisma generate
      - run: cd packages/server && npx prisma db push --skip-generate
      - run: npm test --workspace packages/server

  # === BUILD + PUSH da imagem (só se os testes passarem) ===
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Preparar metadados de build (versão + commit + timestamp do build.gradle/git)
        id: meta
        shell: bash
        run: |
          short="${GITHUB_SHA::7}"
          version="$(grep -E 'versionName' packages/mobile/android/app/build.gradle | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          vcode="$(grep -E 'versionCode' packages/mobile/android/app/build.gradle | head -1 | grep -oE '[0-9]+')"
          built="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Versão carimbada: v${version}.${vcode} (${short}) @ ${built} branch ${GITHUB_REF_NAME}"
          echo "short=$short"        >> "$GITHUB_OUTPUT"
          echo "version=$version"    >> "$GITHUB_OUTPUT"
          echo "vcode=$vcode"        >> "$GITHUB_OUTPUT"
          echo "built=$built"        >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Build-args → viram ENV no Dockerfile → o gerador carimba no buildInfo (server + web).
          # Labels → ficam NA imagem (docker inspect mostra a versão sem rodar o container).
          build-args: |
            VITE_BASE=/minhasaude/
            VITE_API_URL=/minhasaude/api
            VITE_TELEMEDICINE_URL=${{ vars.VITE_TELEMEDICINE_URL }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_VERSION_CODE=${{ steps.meta.outputs.vcode }}
            BUILD_GIT_SHA=${{ github.sha }}
            BUILD_GIT_SHORT_SHA=${{ steps.meta.outputs.short }}
            BUILD_GIT_BRANCH=${{ steps.meta.outputs.branch }}
            BUILD_TIME_ISO=${{ steps.meta.outputs.built }}
          labels: |
            io.janocaminho.build.app=meus-exames
            io.janocaminho.build.version=${{ steps.meta.outputs.version }}
            io.janocaminho.build.version_code=${{ steps.meta.outputs.vcode }}
            io.janocaminho.build.commit_sha=${{ github.sha }}
            io.janocaminho.build.short_sha=${{ steps.meta.outputs.short }}
            io.janocaminho.build.branch=${{ steps.meta.outputs.branch }}
            io.janocaminho.build.time_iso=${{ steps.meta.outputs.built }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
