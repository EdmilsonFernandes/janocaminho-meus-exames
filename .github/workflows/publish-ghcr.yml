name: Publish Docker Image (GHCR)

# BUILDA a imagem no GitHub (servidores potentes) → publica no GHCR.
# O EC2 NÃO builda (só baixa a imagem pronta — não estoura a RAM da t2.micro).
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/edmilsonfernandes/meus-exames-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_BASE=/minhasaude/
            VITE_API_URL=/minhasaude/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
