name: Deploy to EC2

# Deploy AUTOMÁTICO: todo push pra main dispara SSH no EC2 → git pull + rebuild.
# (Espelha o fluxo do EdEspeto, mas mais simples: builda no próprio EC2, sem GHCR.)
# Pré-requisitos (secrets no GitHub): EC2_SSH_KEY (chave privada), EC2_HOST, EC2_USER.

on:
  push:
    branches: ["main"]
  workflow_dispatch: # permite disparar manualmente na aba Actions

concurrency:
  group: deploy-meus-exames
  cancel-in-progress: false # não corta um deploy no meio

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configurar chave SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy no EC2 (git pull + docker compose build + up)
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            "${EC2_USER}@${{ secrets.EC2_HOST }}" \
            'cd ~/meus-exames/janocaminho-meus-exames && pkill -f scripts/deploy.sh 2>/dev/null; SUBPATH=minhasaude sh scripts/deploy.sh'

      - name: Saúde (health check público)
        run: |
          sleep 5
          curl -sf -m 30 "https://${{ secrets.EC2_PUBLIC_URL || secrets.EC2_HOST }}/minhasaude/api/health" \
            && echo "✅ app saudável" || echo "⚠️ health não respondeu (verifique logs no EC2)"
