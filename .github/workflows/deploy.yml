name: Deploy to EC2

# Deploy AUTOMÁTICO: todo push pra main dispara SSH no EC2 → git pull + rebuild.
# Usa os MESMOS secrets do janocaminho (PROD_SSH_*). Builda no próprio EC2 (sem GHCR).

on:
  push:
    branches: ["main"]
  workflow_dispatch: # permite disparar manualmente na aba Actions

concurrency:
  group: deploy-meus-exames
  cancel-in-progress: false # não corta um deploy no meio

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configurar chave SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${PROD_SSH_PORT:-22}" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy no EC2 (git pull + docker compose build + up)
        env:
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER || 'ec2-user' }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/id_rsa -p "$PROD_SSH_PORT" -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            "$PROD_SSH_USER@$PROD_SSH_HOST" \
            'cd ~/meus-exames/janocaminho-meus-exames && pkill -f scripts/deploy.sh 2>/dev/null; SUBPATH=minhasaude sh scripts/deploy.sh'

      - name: Saúde (health check público)
        run: |
          sleep 5
          curl -sf -m 30 "https://janocaminho.com.br/minhasaude/api/health" \
            && echo "✅ app saudável" || echo "⚠️ health não respondeu (verifique logs no EC2)"
