services:
  postgres:
    image: postgres:16-alpine
    container_name: meus-exames-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meus_exames
      POSTGRES_PASSWORD: meus_exames_dev
      POSTGRES_DB: meus_exames
    ports:
      - "5433:5432"  # 5432 ocupado pelo projeto janocaminho; usamos 5433 no host
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meus_exames -d meus_exames"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
